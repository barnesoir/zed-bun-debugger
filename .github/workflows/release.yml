name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-wasip1

      - name: Install dependencies
        run: bun install

      - name: Vendor Bun adapter
        run: bun run scripts/vendor.ts

      - name: Build
        run: bun run scripts/build.ts

      - name: Verify bridge binary exists
        run: |
          if [ ! -f extension/bin/bridge ]; then
            echo "Bridge binary not found at extension/bin/bridge"
            exit 1
          fi
          ls -la extension/bin/bridge

      - name: Upload bridge to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" extension/bin/bridge
  release-zed-extension:
    runs-on: ubuntu-latest
    needs: build-and-upload
    steps:
      - name: Bump Zed extension
        uses: huacnlee/zed-extension-action@v2
        with:
          extension-name: bun-debugger
          push-to: barnesoir/extensions
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
